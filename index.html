<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camper HQ — Gantt</title>
<style>
:root {
  --bg: #f9f8f6; --surface: #ffffff;
  --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.17);
  --text: #1a1a18; --text-sec: #6b6b67; --text-hint: #9a9a96;
  --radius: 6px; --today: #D85A30;
  --col: 56px; --label: 280px; --meta: 100px; --row: 32px;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#18181a; --surface:#232325; --border:rgba(255,255,255,0.09); --border-strong:rgba(255,255,255,0.17); --text:#f0efe8; --text-sec:#9a9a96; --text-hint:#5f5e5a; }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.topbar-title{font-weight:600;font-size:14px;white-space:nowrap}
.topbar-title span{font-weight:400;color:var(--text-sec);font-size:12px;margin-left:6px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.sheets-link{font-size:11px;color:#185FA5;text-decoration:none;display:flex;align-items:center;gap:4px;border:0.5px solid #B5D4F4;padding:4px 9px;border-radius:var(--radius);background:#E6F1FB}
.sheets-link:hover{background:#B5D4F4}
.btn{padding:4px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--bg)}

/* ── FILTERS ── */
.filterbar{padding:7px 14px;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:3px}
.filter-label{font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--text-hint);text-transform:uppercase}
.multiselect{position:relative}
.ms-trigger{border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:4px 8px;font-size:12px;background:var(--bg);color:var(--text);cursor:pointer;min-width:108px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;user-select:none;display:flex;align-items:center;justify-content:space-between;gap:4px}
.ms-trigger:hover{background:var(--surface)}
.ms-trigger .arrow{font-size:9px;opacity:.45;flex-shrink:0}
.ms-dropdown{position:absolute;top:calc(100% + 3px);left:0;z-index:300;background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);box-shadow:0 4px 20px rgba(0,0,0,.15);min-width:190px;max-height:260px;overflow-y:auto;display:none}
.ms-dropdown.open{display:block}
.ms-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;font-size:12px}
.ms-opt:hover{background:var(--bg)}
.ms-opt input{width:13px;height:13px;cursor:pointer;accent-color:#3266ad;flex-shrink:0}
.ms-opt label{cursor:pointer;flex:1}
.ms-all{font-size:11px;padding:6px 10px;border-bottom:0.5px solid var(--border);color:var(--text-sec);cursor:pointer}
.ms-all:hover{background:var(--bg)}

/* ── TIMEBAR ── */
.timebar{padding:6px 14px;background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.timebar-label{font-size:11px;color:var(--text-sec);white-space:nowrap}
.day-inputs{display:flex;gap:5px}
.day-slot{display:flex;flex-direction:column;align-items:center;gap:2px}
.day-slot label{font-size:9px;color:var(--text-hint);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.day-slot input[type=number]{width:42px;text-align:center;padding:3px 4px;border:0.5px solid var(--border-strong);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px}
.timebar-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-btn{padding:4px 9px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:transparent;color:var(--text-sec);cursor:pointer;font-size:15px;line-height:1}
.nav-btn:hover{background:var(--bg);color:var(--text)}
.week-range{font-size:12px;color:var(--text-sec);min-width:130px;text-align:center}

/* ── INFOBAR ── */
.infobar{padding:5px 14px;background:var(--bg);border-bottom:0.5px solid var(--border);font-size:11px;color:var(--text-sec);display:flex;gap:16px;flex-wrap:wrap;flex-shrink:0;align-items:center}

/* ── LEGEND ── */
.legend{padding:5px 14px;border-bottom:0.5px solid var(--border);background:var(--surface);display:flex;gap:12px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-sec)}
.badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;font-weight:600;white-space:nowrap}
.b-DECYZJA{background:#FAEEDA;color:#854F0B}
.b-ZAKUP{background:#E6F1FB;color:#185FA5}
.b-ZADANIE{background:#EAF3DE;color:#3B6D11}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.sd-done{background:#639922}.sd-wip{background:#BA7517}.sd-blocked{background:#A32D2D}.sd-todo{background:#B4B2A9}.sd-form{background:#7F77DD}
.tw-star{width:7px;height:7px;border-radius:50%;background:#D4537E;display:inline-block;flex-shrink:0}

/* ── GANTT BODY ── */
.gantt-outer{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* Split: fixed labels left, scrollable timeline right */
.gantt-split{display:flex;flex:1;overflow:hidden;min-height:0}

/* Left frozen panel */
.gantt-labels{flex-shrink:0;width:calc(var(--label) + var(--meta));overflow:hidden;display:flex;flex-direction:column;border-right:1.5px solid var(--border-strong)}
.labels-head{flex-shrink:0;display:flex;height:52px;align-items:flex-end;background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 8px 6px}
.labels-head span{font-size:10px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.04em}
.labels-scroll{flex:1;overflow:hidden}  /* no scrollbar — synced with right */
.label-row{height:var(--row);display:flex;align-items:center;border-bottom:0.5px solid var(--border);padding:0 8px}
.label-row.stage-lr{background:var(--bg);height:calc(var(--row) + 6px)}
.label-row.stage-lr .stage-pill{font-weight:600;font-size:12px}
.stage-pill{display:inline-flex;align-items:center;gap:5px}
.stage-num{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;color:#fff;flex-shrink:0}
.stage-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.task-label{display:flex;align-items:center;gap:5px;min-width:0;width:var(--label);padding-left:14px;flex-shrink:0}
.task-label .task-icons{display:flex;gap:3px;flex-shrink:0}
.task-label .task-text{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.task-label .task-text.urgent{color:#993C1D;font-weight:500}
.task-meta{width:var(--meta);display:flex;align-items:center;gap:5px;flex-shrink:0;padding-left:4px}
.meta-h{font-size:10px;color:var(--text-hint);white-space:nowrap}

/* Right scrollable timeline */
.gantt-timeline{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}

/* Day-column header row */
.timeline-head{flex-shrink:0;display:flex;height:52px;background:var(--surface);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10}
.day-col-head{width:var(--col);min-width:var(--col);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:5px;border-left:0.5px solid var(--border);font-size:10px;color:var(--text-sec);flex-shrink:0;cursor:default}
.day-col-head.week-start-h{border-left:1.5px solid var(--border-strong)}
.day-col-head.today-h{border-left:2px solid var(--today)}
.day-col-head .dc-dow{font-weight:600;font-size:10px}
.day-col-head .dc-date{font-size:9px;color:var(--text-hint)}
.day-col-head .dc-cap{font-size:9px;color:var(--text-sec);background:var(--border-strong);border-radius:3px;padding:1px 4px;margin-top:1px;font-weight:600}
.day-col-head.today-h .dc-dow,.day-col-head.today-h .dc-date{color:var(--today)}
.day-col-head.weekend-h{background:var(--bg)}
.t-row .weekend-cell{background:rgba(0,0,0,0.025)}
@media (prefers-color-scheme: dark){.t-row .weekend-cell{background:rgba(255,255,255,0.025)}}

/* Timeline rows canvas */
.timeline-rows{position:relative;flex:1}
.t-row{height:var(--row);position:relative;border-bottom:0.5px solid var(--border);display:flex}
.t-row.stage-tr{height:calc(var(--row) + 6px);background:var(--bg)}

/* Day grid lines drawn as background columns */
.t-day-cell{width:var(--col);min-width:var(--col);height:100%;flex-shrink:0;border-left:0.5px solid var(--border);position:relative}
.t-day-cell.week-start-tc{border-left:1.5px solid var(--border-strong)}
.t-day-cell.today-tc{border-left:2px solid var(--today)}
.t-day-cell.today-tc::after{content:'';position:absolute;top:0;bottom:0;left:0;width:100%;background:rgba(216,90,48,.04);pointer-events:none}

/* ── THE GANTT BAR ── absolute, positioned in px from left edge of timeline ── */
.g-bar{position:absolute;top:50%;transform:translateY(-50%);height:16px;border-radius:4px;cursor:pointer;transition:filter .12s;z-index:5;min-width:4px}
.g-bar:hover{filter:brightness(1.12)}
.g-bar.is-done{background-image:repeating-linear-gradient(
    45deg,
    transparent 0px,transparent 4px,
    rgba(255,255,255,.9) 4px,rgba(255,255,255,.9) 6px
  )}
.g-bar.is-blocked{background-color:#b01a1a !important;background-image:repeating-linear-gradient(
    45deg,
    transparent 0px,transparent 4px,
    rgba(255,255,255,.85) 4px,rgba(255,255,255,.85) 6px
  )}
/* Stage span bar — thin strip */
.g-stage-span{position:absolute;bottom:4px;height:4px;border-radius:2px;opacity:.35;z-index:2;pointer-events:none}
/* Today line overlay */
.today-overlay{position:absolute;top:0;bottom:0;width:2px;background:var(--today);opacity:.7;z-index:20;pointer-events:none}

/* Tooltip */
#tooltip{position:fixed;pointer-events:none;z-index:999;display:none;background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:9px 13px;box-shadow:0 4px 20px rgba(0,0,0,.18);max-width:270px;font-size:12px}
#tooltip .tt-title{font-weight:600;margin-bottom:5px;color:var(--text);line-height:1.3}
#tooltip .tt-row{color:var(--text-sec);margin-top:3px}
.empty-msg{padding:40px 16px;text-align:center;color:var(--text-sec);font-size:13px;width:100%}


/* ── RESIZABLE SPLITTER ── */
#gantt-splitter{
  width:5px;flex-shrink:0;cursor:col-resize;background:transparent;
  border-left:1.5px solid var(--border-strong);
  transition:background .15s;position:relative;z-index:10;
}
#gantt-splitter:hover,#gantt-splitter.dragging{background:rgba(50,102,173,.35);}
#gantt-splitter::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:3px;height:32px;border-radius:2px;background:var(--border-strong);
}

/* ── DRAG & DROP ── */
.label-row[draggable=true]{cursor:grab}
.label-row[draggable=true]:active{cursor:grabbing}
.label-row.drag-source{opacity:.35}
.label-row.drop-target{background:rgba(50,102,173,.12) !important;border-top:2px solid #3266ad !important}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;background:var(--surface);border:1.5px solid #3266ad;border-radius:var(--radius);padding:5px 10px;font-size:11px;font-weight:500;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.18);white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis;display:none}
#writebar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9990;display:none;gap:10px;align-items:center;background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:8px 14px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.18)}
#writebar.show{display:flex}
#writebar .wb-msg{color:var(--text)}
#writebar button{font-size:11px;padding:3px 8px;border:0.5px solid var(--border-strong);border-radius:4px;background:transparent;cursor:pointer;color:var(--text)}
#writebar button:hover{background:var(--bg)}
#writebar .wb-confirm{background:#3266ad;color:#fff;border-color:#3266ad}
#writebar .wb-confirm:hover{background:#185FA5}

/* ══ MOBILE VIEW (≤ 680px) ══════════════════════════════════════════════════ */
@media (max-width:812px){
  body{height:100dvh;overflow:hidden;display:flex;flex-direction:column}
  /* Slim single-row topbar */
  .topbar{padding:0 12px;height:44px;flex-wrap:nowrap;gap:0}
  .topbar-title{font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar-title span{display:none}
  .topbar-right{display:none}           /* all desktop btns hidden */
  .filterbar,.timebar,.infobar{display:none}
  .gantt-outer{display:none}
  #mobile-panel{display:flex !important}
  /* hamburger always visible */
  #mb-hamburger{display:flex !important}
}
@media (min-width:813px){
  #mobile-panel{display:none !important}
  #mb-hamburger{display:none !important}
  #mb-drawer{display:none !important}
}

/* Hamburger button */
#mb-hamburger{
  display:none;
  align-items:center;justify-content:center;
  width:36px;height:36px;margin-left:8px;
  border:0.5px solid var(--border-strong);border-radius:var(--radius);
  background:transparent;cursor:pointer;color:var(--text);font-size:18px;
  flex-shrink:0;
}

/* Slide-down drawer */
#mb-drawer{
  position:fixed;top:44px;left:0;right:0;z-index:500;
  background:var(--surface);border-bottom:1px solid var(--border-strong);
  padding:12px;display:none;flex-direction:column;gap:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.18);
}
#mb-drawer.open{display:flex}
.mb-drawer-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mb-drawer-label{font-size:10px;font-weight:600;color:var(--text-hint);
  text-transform:uppercase;letter-spacing:.04em;width:60px;flex-shrink:0}
.mb-drawer-btns{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.mb-drawer-btn{font-size:12px;padding:5px 10px;border:0.5px solid var(--border-strong);
  border-radius:20px;background:transparent;cursor:pointer;color:var(--text);white-space:nowrap}
.mb-drawer-btn:active,.mb-drawer-btn.active-btn{
  background:var(--text);color:var(--surface);border-color:var(--text)}
.mb-drawer-divider{height:0.5px;background:var(--border);margin:2px 0}
.mb-drawer-actions{display:flex;gap:8px;flex-wrap:wrap}
.mb-drawer-action{font-size:12px;padding:6px 12px;border:0.5px solid var(--border-strong);
  border-radius:var(--radius);background:transparent;cursor:pointer;color:var(--text)}

/* Mobile panel */
#mobile-panel{flex-direction:column;flex:1;overflow:hidden;min-height:0;display:none}

/* Chip filter bar — single scrollable row */
#mb-chips{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;overflow-x:auto;flex-shrink:0;
  background:var(--surface);border-bottom:0.5px solid var(--border);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
#mb-chips::-webkit-scrollbar{display:none}
.mb-chip{font-size:11px;padding:4px 10px;border:0.5px solid var(--border-strong);
  border-radius:20px;background:transparent;cursor:pointer;
  color:var(--text-sec);white-space:nowrap;flex-shrink:0}
.mb-chip.on{background:var(--text);color:var(--surface);border-color:var(--text)}
.mb-chip-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}

/* Infobar */
#mobile-infobar{
  padding:5px 12px;font-size:11px;color:var(--text-sec);
  background:var(--bg);border-bottom:0.5px solid var(--border);
  flex-shrink:0;display:flex;gap:12px;flex-wrap:wrap;align-items:center;
}

/* Task list */
#mobile-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

.mb-day{
  display:flex;align-items:baseline;gap:8px;
  padding:10px 12px 6px;
  background:var(--bg);
  border-bottom:1.5px solid var(--border-strong);
  position:sticky;top:0;z-index:20;
}
.mb-day-name{font-size:13px;font-weight:700;color:var(--text)}
.mb-day-date{font-size:11px;color:var(--text-hint)}
.mb-day-h{font-size:11px;color:var(--text-sec);margin-left:auto}
.mb-day.is-today .mb-day-name{color:var(--today)}
.mb-day.is-today .mb-day-date{color:var(--today)}
.mb-day.is-today{border-bottom-color:var(--today)}
.mb-day-stage{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px 4px 20px;
  background:var(--bg);
  border-bottom:0.5px solid var(--border);
}
.mb-day-stage-num{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;color:#fff;flex-shrink:0}
.mb-day-stage-name{font-size:11px;color:var(--text-sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:var(--bg);
  border-bottom:0.5px solid var(--border-strong);
  position:sticky;top:0;z-index:10;
}
.mb-stage-num{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;color:#fff;flex-shrink:0}
.mb-stage-name{font-size:12px;font-weight:600;color:var(--text);flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mb-stage-h{font-size:11px;color:var(--text-hint);flex-shrink:0}

.mb-task{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-bottom:0.5px solid var(--border);
  background:var(--surface);
}
.mb-task-bar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:28px}
.mb-task-body{flex:1;min-width:0}
.mb-task-name{font-size:13px;line-height:1.35;color:var(--text);margin-bottom:4px}
.mb-task-name.urgent{color:#993C1D;font-weight:500}
.mb-task-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mb-date{font-size:11px;color:var(--text-sec)}
.mb-task-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.mb-hours{font-size:12px;font-weight:500;color:var(--text-sec)}
.mb-item-num{font-size:10px;color:var(--text-hint)}
.mb-tw{width:7px;height:7px;border-radius:50%;background:#D4537E;display:inline-block;flex-shrink:0}
.mb-status{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:500}
.ms-done{background:#d6f0b4;color:#3B6D11}
.ms-wip{background:#FAEEDA;color:#854F0B}
.ms-blocked{background:#fcd4d4;color:#A32D2D}
.ms-todo{background:var(--bg);color:var(--text-sec);border:0.5px solid var(--border-strong)}
.ms-form{background:#e8e6f9;color:#534AB7}

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🚐 Camper HQ <span>Renault Trafic 2013</span></div>
  <div class="topbar-right">
    <a class="sheets-link" id="sheetsLink" href="#" target="_blank">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Open in Sheets
    </a>
    <button class="btn" id="reloadBtn">↻ Reload</button>
    <button class="btn" id="clearStorageBtn" title="Clear saved filters and hour overrides, then reload fresh">⚠ Reset storage</button>
    <button class="btn" id="setupBtn">⚙ Setup</button>
  </div>
  <!-- Mobile hamburger — hidden on desktop via CSS -->
  <button id="mb-hamburger" aria-label="Menu">☰</button>
</div>

<!-- Mobile slide-down drawer -->
<div id="mb-drawer">
  <div class="mb-drawer-row">
    <span class="mb-drawer-label">Stage</span>
    <div class="mb-drawer-btns" id="mb-stage-btns"></div>
  </div>
  <div class="mb-drawer-divider"></div>
  <div class="mb-drawer-row">
    <span class="mb-drawer-label">Status</span>
    <div class="mb-drawer-btns" id="mb-status-btns"></div>
  </div>

const STAGE_BG     = {0:'#B4B2A9',1:'#85B7EB',2:'#5DCAA5',3:'#AFA9EC',4:'#F0997B',5:'#9FE1CB',6:'#ED93B1',7:'#FAC775',8:'#97C459'};

// ── STATE ────────────────────────────────────────────────────────────────────
let rawData = STATIC_DATA;
let filters = {etap:new Set(),typ:new Set(),priorytet:new Set(),tenTydzen:new Set(),status:new Set()};
let dayHours = {};
let viewWeekOffset = 0;

// ── DATE UTILS ────────────────────────────────────────────────────────────────
function getMonday(d){const r=new Date(d);r.setHours(0,0,0,0);const day=r.getDay();r.setDate(r.getDate()-(day===0?6:day-1));return r}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtISO(d){
  // Use local year/month/day — toISOString() uses UTC which shifts the date in UTC+ timezones
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fmtDD(d){return d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'})}
function fmtLong(d){return d.toLocaleDateString('pl-PL',{day:'numeric',month:'short',year:'numeric'})}
function isWeekend(d){const w=d.getDay();return w===0||w===6}
function skipWork(d){let r=new Date(d);while(isWeekend(r))r=addDays(r,1);return r}
function getDayAvail(k){
  // Every day defaults to DEFAULT_HOURS — weekends are normal working days
  if(dayHours[k]!==undefined) return dayHours[k];
  return DEFAULT_HOURS;
}

// All calendar days between two dates inclusive (weekends shown, greyed out)
function allDaysBetween(from, to){
  const days=[];
  let d=new Date(from);
  while(d<=to){days.push(new Date(d));d=addDays(d,1);}
  return days;
}
// Still used for scheduling — weekends have 0 capacity by default
function workDaysBetween(from, to){
  const days=[];
  let d=new Date(from);
  while(d<=to){if(!isWeekend(d))days.push(new Date(d));d=addDays(d,1);}
  return days;
}

// ── DATA STAGES ───────────────────────────────────────────────────────────────
function getStages(){
  const stages=[];let cur=null;
  for(const row of rawData){
    if(row.typ==='ETAP'){cur={...row,steps:[]};stages.push(cur);}
    else if(cur) cur.steps.push(row);
  }
  return stages;
}
function applyFilters(stages){
  return stages.map(s=>{
    if(filters.etap.size&&!filters.etap.has(String(s.etap)))return null;
    let steps=s.steps.filter(t=>t.czas&&t.czas>0);
    if(filters.typ.size) steps=steps.filter(t=>filters.typ.has(t.typ));
    if(filters.priorytet.size) steps=steps.filter(t=>filters.priorytet.has(t.priorytet));
    if(filters.tenTydzen.size) steps=steps.filter(t=>filters.tenTydzen.has(t.tenTydzen));
    if(filters.status.size) steps=steps.filter(t=>filters.status.has(t.status));
    const hasActiveFilter=filters.typ.size||filters.priorytet.size||filters.tenTydzen.size||filters.status.size;
    if(steps.length===0&&hasActiveFilter)return null;
    // Sort by Item # ascending (nulls last)
    steps=steps.slice().sort((a,b)=>{
      if(a.item==null&&b.item==null)return 0;
      if(a.item==null)return 1;
      if(b.item==null)return -1;
      return a.item-b.item;
    });
    return{...s,steps};
  }).filter(Boolean);
}

// ── SCHEDULER ─────────────────────────────────────────────────────────────────
// Returns tasks with .startDate, .endDate
// Tasks are distributed across ALL days (incl weekends) at getDayAvail(day) hours/day
function schedule(tasks){
  const today=new Date();today.setHours(0,0,0,0);
  const deadline=addDays(today,730);
  const used={};
  const avail=d=>{const k=fmtISO(d);const cap=getDayAvail(k);return cap-(used[k]||0);};
  const consume=(d,h)=>{const k=fmtISO(d);used[k]=(used[k]||0)+h;};
  const results=[];

  // ── PASS 1: Zrobione tasks ────────────────────────────────────────────────
  // These are pinned to their completion date and consume capacity on that date.
  // They do NOT interact with the cursor so they never affect where pending tasks land.
  // Past completions: pin to completedDate, consume capacity on that past date.
  // Today's completions: pin to today, consume today's capacity.
  // No date: pin to today, consume today's capacity.
  tasks.filter(t=>t.status==='Zrobione').forEach(task=>{
    const pinDate=task.completedDate||today;
    consume(pinDate,task.czas); // consumes capacity on that day
    results.push({
      ...task,
      segs:[{date:pinDate,hours:task.czas,cap:getDayAvail(fmtISO(pinDate))}],
      startDate:pinDate,
      endDate:pinDate,
      pinned:true,
    });
  });

  // ── PASS 2: All other tasks in Item # order via cursor ────────────────────
  // Zablokowane included — they occupy capacity just like any other task.
  // Cursor starts at today and advances as days fill up.
  let cursor=new Date(today);
  tasks.filter(t=>t.status!=='Zrobione').forEach(task=>{
    let rem=task.czas;
    const segs=[];
    let guard=0;
    while(rem>0.001&&cursor<deadline){
      guard++;if(guard>10000)break;
      const a=avail(cursor);
      if(a<=0.001){cursor=addDays(cursor,1);continue;}
      const h=Math.min(rem,a);
      segs.push({date:new Date(cursor),hours:h,cap:getDayAvail(fmtISO(cursor))});
      consume(cursor,h);
      rem-=h;
      if(avail(cursor)<=0.001)cursor=addDays(cursor,1);
    }
    if(segs.length){
      results.push({...task,segs,startDate:segs[0].date,endDate:segs[segs.length-1].date});
    }
  });

  return results;
}

// ── DAY INPUTS ────────────────────────────────────────────────────────────────
function buildDayInputs(viewMonday){
  const container=document.getElementById('dayInputs');
  container.innerHTML='';
  for(let i=0;i<7;i++){
    const d=addDays(viewMonday,i);
    const key=fmtISO(d);
    const val=getDayAvail(key);
    const slot=document.createElement('div');
    slot.className='day-slot';
    // Weekends shown at full opacity — available for allocation
    slot.innerHTML=`<label>${DOW_PL[d.getDay()]}<br>${fmtDD(d)}</label><input type="number" min="0" max="16" step="0.5" value="${val}" data-key="${key}">`;
    slot.querySelector('input').addEventListener('change',e=>{
      const v=parseFloat(e.target.value);
      if(!isNaN(v)&&v>=0){
        if(v===DEFAULT_HOURS){
          delete dayHours[key]; // default — no override needed
        } else {
          dayHours[key]=v;
        }
        saveState();
        render();
        postCapacity(key, v===DEFAULT_HOURS ? null : v);
      }
    });
    container.appendChild(slot);
  }
}

// ── MULTISELECT ───────────────────────────────────────────────────────────────
function buildMultiSelect(label,options,stateKey){
  const group=document.createElement('div');
  group.className='filter-group';
  group.innerHTML=`<span class="filter-label">${label}</span>`;
  const ms=document.createElement('div');ms.className='multiselect';
  const trigger=document.createElement('div');trigger.className='ms-trigger';trigger.tabIndex=0;
  const lspan=document.createElement('span');lspan.className='ms-label';
  lspan.textContent=filters[stateKey].size===0?'All':`${filters[stateKey].size} selected`;
  trigger.appendChild(lspan);
  const arr=document.createElement('span');arr.className='arrow';arr.textContent='▾';trigger.appendChild(arr);
  const dd=document.createElement('div');dd.className='ms-dropdown';
  const allBtn=document.createElement('div');allBtn.className='ms-all';allBtn.textContent='✕ Clear';
  allBtn.addEventListener('click',e=>{
    e.stopPropagation();filters[stateKey].clear();
    dd.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.checked=false);
    lspan.textContent='All';saveState();render();
  });
  dd.appendChild(allBtn);
  options.forEach(opt=>{
    const div=document.createElement('div');div.className='ms-opt';
    const cb=document.createElement('input');cb.type='checkbox';cb.value=opt.value;
    cb.id=`ms-${stateKey}-${opt.value}`;cb.checked=filters[stateKey].has(opt.value);
    const lbl=document.createElement('label');lbl.htmlFor=cb.id;lbl.textContent=opt.label;
    div.appendChild(cb);div.appendChild(lbl);
    cb.addEventListener('change',e=>{
      e.stopPropagation();
      if(cb.checked)filters[stateKey].add(opt.value);else filters[stateKey].delete(opt.value);
      const sel=filters[stateKey];
      lspan.textContent=sel.size===0?'All':`${sel.size} selected`;
      saveState();render();
    });
    dd.appendChild(div);
  });
  trigger.addEventListener('click',e=>{
    e.stopPropagation();const was=dd.classList.contains('open');
    document.querySelectorAll('.ms-dropdown.open').forEach(x=>x.classList.remove('open'));
    if(!was)dd.classList.add('open');
  });
  ms.appendChild(trigger);ms.appendChild(dd);group.appendChild(ms);return group;
}
document.addEventListener('click',()=>document.querySelectorAll('.ms-dropdown.open').forEach(x=>x.classList.remove('open')));

function rebuildFilterOptions(){
  const stages=getStages();
  const etapOpts=stages.map(s=>({value:String(s.etap),label:`E${s.etap}: ${(s.opis||'').slice(0,24)}`}));
  const typOpts=[{value:'ZADANIE',label:'ZADANIE'},{value:'DECYZJA',label:'DECYZJA'},{value:'ZAKUP',label:'ZAKUP'}];
  const priOpts=['Pilne','Wysoki','Normalny'].map(v=>({value:v,label:v}));
  const tydOpts=[{value:'TAK',label:'Yes — this week'},{value:'NIE',label:'No'}];
  const statOpts=['Do zrobienia','W toku','Zablokowane','Zrobione','W formułowaniu'].map(v=>({value:v,label:v}));
  const fb=document.getElementById('filterbar');fb.innerHTML='';
  fb.appendChild(buildMultiSelect('Stage',etapOpts,'etap'));
  fb.appendChild(buildMultiSelect('Type',typOpts,'typ'));
  fb.appendChild(buildMultiSelect('Priority',priOpts,'priorytet'));
  fb.appendChild(buildMultiSelect('This week',tydOpts,'tenTydzen'));
  fb.appendChild(buildMultiSelect('Status',statOpts,'status'));
  const cg=document.createElement('div');cg.className='filter-group';
  cg.innerHTML='<span class="filter-label" style="opacity:0">x</span>';
  const cb=document.createElement('button');cb.className='btn';cb.textContent='✕ Clear all';
  cb.addEventListener('click',()=>{Object.keys(filters).forEach(k=>filters[k].clear());rebuildFilterOptions();saveState();render();});
  cg.appendChild(cb);fb.appendChild(cg);
}

const tt=document.getElementById('tooltip');
function showTT(e,task){

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const today=new Date();today.setHours(0,0,0,0);
  const thisMonday=getMonday(today);
  const viewMonday=addDays(thisMonday,viewWeekOffset*7);
  const viewSunday=addDays(viewMonday,6);

  buildDayInputs(viewMonday);
  document.getElementById('weekRange').textContent=`${fmtDD(viewMonday)} – ${fmtDD(viewSunday)}`;
  if(SHEETS_EDIT_URL&&!SHEETS_EDIT_URL.includes('YOUR_'))document.getElementById('sheetsLink').href=SHEETS_EDIT_URL;
  else document.getElementById('sheetsLink').style.display='none';

  // Filter & schedule
  const stages=getStages();
  const filtered=applyFilters(stages);

  // ── SCHEDULING: flat list from rawData sorted purely by global Item # ──────
  // This is INDEPENDENT of the stage-grouped display structure.
  // We apply the same filters but collect across all stages in global Item # order.
  const today4sched=new Date(); today4sched.setHours(0,0,0,0);
  const allTasksForSchedule=[];
  rawData.forEach(r=>{
    if(r.typ==='ETAP'||!r.czas||r.czas<=0||r.item==null) return;
    // ── Zrobione scheduling rule ──────────────────────────────────────────────
    // completedDate < today  → skip entirely (already done on a past day)
    // completedDate = today  → include (counts to today's workstack, pin to today)
    // completedDate missing  → include (status set but no date — treat as today)
    // Not Zrobione           → include normally
    // Zrobione before today: still included so their pinned bar shows, scheduler handles them
    // Zrobione today or no date: included normally, consume today's capacity
    // Apply active filters
    if(filters.etap.size&&!filters.etap.has(String(r.etap))) return;
    if(filters.typ.size&&!filters.typ.has(r.typ)) return;
    if(filters.priorytet.size&&!filters.priorytet.has(r.priorytet)) return;
    if(filters.tenTydzen.size&&!filters.tenTydzen.has(r.tenTydzen)) return;
    if(filters.status.size&&!filters.status.has(r.status)) return;
    allTasksForSchedule.push(r);
  });
  // Sort by global Item # — coerce to number defensively
  allTasksForSchedule.sort((a,b)=>Number(a.item)-Number(b.item));
  const scheduled=schedule(allTasksForSchedule);
  const schedMap={};
  scheduled.forEach(t=>{
    schedMap[`${t.etap}-${t.item}`]=t;  // legacy key (for stage span lookup)
    schedMap[`opis:${t.opis}`]=t;        // primary key by unique name
  });

  // Date range for columns: from viewMonday to max(endDate, viewMonday+13) 
  const lastSched=scheduled.length?scheduled[scheduled.length-1].endDate:null;
  const colEnd=lastSched?addDays(lastSched,2):addDays(viewMonday,13);
  // Show at least current+next week
  const colEndMin=addDays(viewMonday,13);
  const colEndFinal=colEnd>colEndMin?colEnd:colEndMin;

  // All calendar days (incl weekends) from viewMonday to colEndFinal
  const colDays=allDaysBetween(viewMonday,colEndFinal);
  const nCols=colDays.length;
  const totalWidth=nCols*COL_W;

  // Day-index lookup: ISO date → column index
  const dayIdx={};
  colDays.forEach((d,i)=>dayIdx[fmtISO(d)]=i);

  // Helper: date → pixel x (left edge of that day's column)
  // For a bar spanning start→end we use: left=dayIdx[start]*COL_W, right=(dayIdx[end]+1)*COL_W
  function dateToX(d){
    const k=fmtISO(d);
    if(dayIdx[k]!==undefined)return dayIdx[k]*COL_W;
    // date may be before view window
    if(d<colDays[0])return 0;
    return totalWidth;
  }
  function barLeft(startDate){return dateToX(startDate);}
  function barRight(endDate){
    const k=fmtISO(endDate);
    if(dayIdx[k]!==undefined)return(dayIdx[k]+1)*COL_W;
    if(endDate>colDays[colDays.length-1])return totalWidth;
    return 0;
  }
  function barWidth(startDate,endDate){return Math.max(6,barRight(endDate)-barLeft(startDate));}

  // Today line x
  const todayX=dayIdx[fmtISO(today)]!==undefined?(dayIdx[fmtISO(today)]*COL_W+COL_W/2):null;

  // Info bar
  const totalH=scheduled.reduce((s,t)=>s+(t.czas||0),0);
  const doneCnt=scheduled.filter(t=>t.status==='Zrobione').length;
  const isLive = rawData !== STATIC_DATA;
  document.getElementById('infobar').innerHTML=`
    <span>${scheduled.length} tasks</span>
    <span>${totalH.toFixed(1)}h total</span>
    <span>✅ ${doneCnt} done</span>
    ${lastSched?`<span>Completion: <strong>${fmtLong(lastSched)}</strong></span>`:''}
    <span style="margin-left:auto;font-size:10px;padding:2px 7px;border-radius:3px;background:${isLive?'#1a3a1a':'#3a2a0a'};color:${isLive?'#97C459':'#FAC775'}">${isLive?'● Live data':'⚠ Static snapshot — click Reload'}</span>
  `;

  // ── BUILD LABEL ROWS ────────────────────────────────────────────────────────
  let labelHTML='';
  if(filtered.length===0){
    labelHTML=`<div style="padding:30px 14px;color:var(--text-sec);font-size:13px">No tasks match filters.</div>`;
  }
  filtered.forEach(stage=>{
    const sc=STAGE_COLORS[stage.etap]||'#888';
    const stageH=stage.steps.reduce((s,t)=>s+(t.czas||0),0);
    labelHTML+=`<div class="label-row stage-lr" style="height:${STAGE_ROW_H}px">
      <div class="task-label" style="width:calc(var(--label) + var(--meta));padding-left:8px">
        <div class="stage-pill">
          <span class="stage-num" style="background:${sc}">${stage.etap}</span>
          <span class="stage-name">${stage.opis}</span>
        </div>
        <span style="margin-left:auto;font-size:10px;color:var(--text-hint);white-space:nowrap;padding-right:8px">${stageH>0?stageH.toFixed(1)+'h':''}</span>
      </div>
    </div>`;
    stage.steps.forEach(step=>{
      const key=`${step.etap}-${step.item}`;
      const sched=schedMap[`opis:${step.opis}`]||schedMap[key];
      const dotCls={'Zrobione':'sd-done','W toku':'sd-wip','Zablokowane':'sd-blocked','Do zrobienia':'sd-todo','W formułowaniu':'sd-form'}[step.status]||'sd-todo';
      const isUrgent=step.priorytet==='Pilne';
      const badgeCls=`b-${step.typ}`;
      labelHTML+=`<div class="label-row" style="height:${ROW_H}px" draggable="true" data-etap="${step.etap}" data-item="${step.item}" data-opis="${step.opis.replace(/`/g,'\\`')}">
        <div class="task-label" style="width:var(--label)">
          <div class="task-icons">
            ${step.tenTydzen==='TAK'?'<span class="tw-star" title="This week"></span>':''}
          </div>
          <span class="task-text${isUrgent?' urgent':''}" title="${step.opis}">${step.opis}</span>
        </div>
        <div class="task-meta">
          <span class="badge ${badgeCls}">${step.typ}</span>
          <span class="meta-h">${step.czas?step.czas.toFixed(1)+'h':''}</span>
        </div>
      </div>`;
    });
  });
  document.getElementById('labelRows').innerHTML=labelHTML;

  // ── BUILD TIMELINE HEAD ─────────────────────────────────────────────────────
  let headHTML=`<div style="width:${totalWidth}px;display:flex">`;
  colDays.forEach(d=>{
    const isToday=fmtISO(d)===fmtISO(today);
    const isMon=d.getDay()===1;
    const cap=getDayAvail(fmtISO(d));
    const isWknd=isWeekend(d);
    const cls=`day-col-head${isToday?' today-h':''}${isMon?' week-start-h':''}${isWknd?' weekend-h':''}`;
    headHTML+=`<div class="${cls}" style="width:${COL_W}px;min-width:${COL_W}px">
      <div class="dc-dow">${DOW_PL[d.getDay()]}</div>
      <div class="dc-date">${fmtDD(d)}</div>
      <div class="dc-cap">${cap}h</div>
    </div>`;
  });
  headHTML+='</div>';
  document.getElementById('timelineHead').innerHTML=headHTML;

  // ── BUILD TIMELINE ROWS ─────────────────────────────────────────────────────
  let rowsHTML=`<div style="width:${totalWidth}px;position:relative">`;
  // Today overlay line
  if(todayX!==null){
    rowsHTML+=`<div class="today-overlay" style="left:${todayX}px"></div>`;
  }

  filtered.forEach(stage=>{
    const sc=STAGE_COLORS[stage.etap]||'#888';
    const bg=STAGE_BG[stage.etap]||'#ccc';

    // Stage row — show a spanning bar across all scheduled tasks in this stage
    const stageTasks=stage.steps.map(t=>schedMap[`${t.etap}-${t.item}`]).filter(Boolean);
    const stageStart=stageTasks.map(t=>t.startDate).sort((a,b)=>a-b)[0];
    const stageEnd=stageTasks.map(t=>t.endDate).sort((a,b)=>b-a)[0];

    rowsHTML+=`<div class="t-row stage-tr" style="height:${STAGE_ROW_H}px;position:relative">`;
    // Grid lines
    colDays.forEach((d,i)=>{
      const isMon=d.getDay()===1;
      const isToday2=fmtISO(d)===fmtISO(today);
      const isWknd2=isWeekend(d);
      rowsHTML+=`<span style="position:absolute;top:0;bottom:0;left:${i*COL_W}px;width:${COL_W}px;border-left:${isMon?'1.5px solid var(--border-strong)':isToday2?'2px solid var(--today)':'0.5px solid var(--border)'};${isWknd2?'background:rgba(0,0,0,0.03)':''}"></span>`;
    });
    if(stageStart&&stageEnd){
      const left=barLeft(stageStart);const width=barWidth(stageStart,stageEnd);
      rowsHTML+=`<div class="g-stage-span" style="left:${left}px;width:${width}px;background:${bg}"></div>`;
    }
    rowsHTML+='</div>';

    // Task rows
    stage.steps.forEach(step=>{
      const key=`${step.etap}-${step.item}`;
      const sched=schedMap[`opis:${step.opis}`]||schedMap[key];
      rowsHTML+=`<div class="t-row" style="height:${ROW_H}px;position:relative">`;
      // Grid lines
      colDays.forEach((d,i)=>{
        const isMon=d.getDay()===1;
        const isToday2=fmtISO(d)===fmtISO(today);
        const isWknd2=isWeekend(d);
        rowsHTML+=`<span style="position:absolute;top:0;bottom:0;left:${i*COL_W}px;width:${COL_W}px;border-left:${isMon?'1.5px solid var(--border-strong)':isToday2?'2px solid var(--today)':'0.5px solid var(--border)'};${isWknd2?'background:rgba(0,0,0,0.03)':''}"></span>`;
      });
      // THE GANTT BAR — one continuous bar from startDate to endDate
      if(sched&&sched.startDate&&sched.endDate){
        const left=barLeft(sched.startDate);
        const width=barWidth(sched.startDate,sched.endDate);
        const doneCls=step.status==='Zrobione'?' is-done':step.status==='Zablokowane'?' is-blocked':'';
        const sc2=STAGE_COLORS[step.etap]||'#888';
        rowsHTML+=`<div class="g-bar${doneCls}"
          style="left:${left+2}px;width:${width-4}px;background-color:${sc2}"
          data-key="${key}"></div>`;
      }
      rowsHTML+='</div>';
    });
  });
  rowsHTML+='</div>';
  document.getElementById('timelineRows').innerHTML=rowsHTML;

  // Tooltip events on bars
  document.querySelectorAll('.g-bar[data-key]').forEach(el=>{
    const key=el.dataset.key;
    const task=schedMap[key];
    if(!task)return;
    el.addEventListener('mouseenter',e=>showTT(e,task));
    el.addEventListener('mousemove',moveTT);
    el.addEventListener('mouseleave',hideTT);
  });
}

// ── CSV LOADER ────────────────────────────────────────────────────────────────
function parseCSVRow(line){const res=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){res.push(cur);cur='';}else cur+=c;}res.push(cur);return res;}
function parseCSV(text){
  // Normalise line endings
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  // Find header row — contains both 'Etap' and 'Typ'
  let hi=-1;
  for(let i=0;i<lines.length;i++){
    if(lines[i].includes('Etap')&&lines[i].includes('Typ')){hi=i;break;}
  }
  if(hi<0){console.error('Gantt: header row not found. First 3 lines:',lines.slice(0,3));return null;}
  const headers=parseCSVRow(lines[hi]).map(h=>h.trim().replace(/^"|"$/g,''));
  // Exact match first, partial fallback
  const idx=k=>{
    const ex=headers.findIndex(h=>h===k);
    if(ex>=0)return ex;
    return headers.findIndex(h=>h.toLowerCase().includes(k.toLowerCase()));
  };
  // Column indices — log them so we can debug
  const iE=idx('Etap #'), iI=idx('Item #'), iT=idx('Typ'), iO=idx('Opis'), iC=idx('Czas'), iS=idx('Status'), iP=idx('Priorytet');
  const iTy=headers.findIndex(h=>h.includes('tydzie')||h.includes('tydzień')||h.toLowerCase().includes('tydz'));
  const iD=idx('Data Zrobione'); // 'Data Zrobione' column
  if(iE<0||iI<0||iO<0){console.error('Gantt: critical columns not found in headers:',headers);return null;}
  const res=[];
  for(let i=hi+1;i<lines.length;i++){
    const c=parseCSVRow(lines[i]);
    if(!c.some(x=>x))continue;
    const etapRaw=(c[iE]||'').trim();
    const etap=parseFloat(etapRaw);
    if(isNaN(etap)&&etapRaw!=='0')continue;
    const czas=parseFloat((c[iC]||'').trim());
    const itemVal=parseFloat((c[iI]||'').trim());
    // Parse completedDate — always extract YYYY-MM-DD portion first to avoid
    // UTC→local timezone shifts (e.g. "2026-06-26T22:00:00Z" shifting to 27th)
    let completedDate=null;
    if(iD>=0&&c[iD]){
      const raw=(c[iD]||'').trim();
      if(raw){
        // ISO date: take only the date part before any T
        const isoM=raw.match(/(\d{4})-(\d{2})-(\d{2})/);
        if(isoM){
          completedDate=new Date(+isoM[1],+isoM[2]-1,+isoM[3]);
        } else {
          // DD/MM/YYYY fallback
          const dmyM=raw.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
          if(dmyM) completedDate=new Date(+dmyM[3],+dmyM[2]-1,+dmyM[1]);
        }
        if(completedDate) completedDate.setHours(0,0,0,0);
      }
    }
    res.push({
      etap:isNaN(etap)?0:etap,
      item:isNaN(itemVal)?null:itemVal,
      typ:(c[iT]||'').trim(),
      opis:(c[iO]||'').trim(),
      czas:isNaN(czas)?null:czas,
      status:(c[iS]||'').trim(),
      priorytet:(c[iP]||'').trim(),
      tenTydzen:(c[iTy]||'').trim().toUpperCase(),
      completedDate,
    });
  }
  return res;
}
let _toast;
function showToast(msg,type){
  if(!_toast){_toast=document.createElement('div');document.body.appendChild(_toast);}
  const col={info:'#185FA5',ok:'#3B6D11',warn:'#854F0B',error:'#A32D2D'}[type]||'#333';
  Object.assign(_toast.style,{position:'fixed',bottom:'18px',left:'50%',transform:'translateX(-50%)',zIndex:'9999',background:col,color:'#fff',padding:'8px 16px',borderRadius:'6px',fontSize:'12px',opacity:'1',transition:'opacity .3s'});
  _toast.textContent=msg;clearTimeout(_toast._t);_toast._t=setTimeout(()=>_toast.style.opacity='0',3000);
}
function loadFromSheets(){
  if(!SHEETS_CSV_URL||SHEETS_CSV_URL.includes('YOUR_')){
    showToast('Paste your Apps Script URL into SHEETS_CSV_URL in the HTML file.','warn');return;
  }
  showToast('Loading from Sheets…','info');
  // Use JSONP script-tag injection — the ONLY method that works from file:// to external URLs.
  // Requires doGet in Apps Script to support ?callback=xxx and return wrapped JSON (see below).
  const cbName = '_ganttLoad_' + Date.now();
  const script = document.createElement('script');
  script.src = SHEETS_CSV_URL + (SHEETS_CSV_URL.includes('?')?'&':'?') + 'callback=' + cbName + '&_t=' + Date.now();
  const timer = setTimeout(()=>{
    cleanup();
    showToast('Timeout — check Apps Script URL and deployment','error');
  }, 15000);
  window[cbName] = function(data){
    cleanup();
    try{
      // Unpack: new Apps Script returns {rows, capacities}, old returns plain array
      const rows = Array.isArray(data) ? data : (data.rows || []);
      if(!rows.length) throw new Error('No rows returned — check sheet name in Apps Script');

      // completedDate arrives as "YYYY-MM-DD" string (formatted in Apps Script timezone)
      // Parse directly to local midnight Date — no UTC shift possible
      rows.forEach(r=>{
        if(r.completedDate){
          const isoM=String(r.completedDate).match(/(\d{4})-(\d{2})-(\d{2})/);
          r.completedDate = isoM ? new Date(+isoM[1],+isoM[2]-1,+isoM[3]) : null;
        }
      });
      rawData = rows;

      // Load capacity overrides from sheet — merge into dayHours (sheet wins over localStorage)
      if(!Array.isArray(data) && data.capacities){
        Object.entries(data.capacities).forEach(([date,h])=>{
          dayHours[date] = Number(h);
        });
        saveState(); // persist merged capacities locally too
      }

      rebuildFilterOptions(); render(); if(isMobile()) renderMobile(); initDrag();
      showToast('Loaded ' + rows.filter(r=>r.typ!=='ETAP').length + ' tasks ✓','ok');
    }catch(e){
      showToast('Parse error: '+e.message,'error');
      console.error('Gantt JSONP error:',e,data);
    }
  };
  function cleanup(){ clearTimeout(timer); delete window[cbName]; if(script.parentNode) script.remove(); }
  script.onerror = ()=>{ cleanup(); showToast('Script load failed — check Apps Script URL','error'); };
  document.head.appendChild(script);
}

function fetchViaJsonp(){
  return new Promise((resolve,reject)=>{
    const cbName='_ganttCb_'+Date.now();
    const url=SHEETS_CSV_URL+'?callback='+cbName;
    const script=document.createElement('script');
    script.src=url;
    const timer=setTimeout(()=>{cleanup();reject(new Error('Timeout — check the share URL'));},8000);
    window[cbName]=function(json){
      cleanup();
      try{resolve(parseGvizJson(json));}
      catch(e){reject(e);}
    };
    function cleanup(){clearTimeout(timer);delete window[cbName];script.remove();}
    script.onerror=()=>{cleanup();reject(new Error('Script blocked — sheet may not be shared'));};
    document.head.appendChild(script);
  });
}

function parseGvizJson(json){
  const cols=json.table.cols.map(c=>c.label||'');
  const rows=json.table.rows||[];
  const idx=k=>cols.findIndex(h=>h.includes(k));
  const iE=idx('Etap'),iI=idx('Item'),iT=idx('Typ'),iO=idx('Opis'),iC=idx('Czas'),iS=idx('Status'),iP=idx('Priorytet');
  const iTy=cols.findIndex(h=>h.includes('tydzie')||h.includes('tydzień'));
  const result=[];
  for(const row of rows){
    const g=i=>(row.c&&row.c[i]!=null&&row.c[i].v!=null)?row.c[i].v:null;
    const etapRaw=g(iE);
    const etap=parseFloat(etapRaw);
    if(isNaN(etap)&&etapRaw!=='0'&&etapRaw!==0)continue;
    const czas=parseFloat(g(iC));
    const typ=String(g(iT)||'').trim();
    if(!typ)continue;
      const itemVal=g(iI)!=null?parseFloat(g(iI)):NaN;
    result.push({
      etap:isNaN(etap)?0:etap,
      item:isNaN(itemVal)?null:itemVal,
      typ,opis:String(g(iO)||'').trim(),
      czas:isNaN(czas)?null:czas,
      status:String(g(iS)||'').trim(),
      priorytet:String(g(iP)||'').trim(),
      tenTydzen:String(g(iTy)||'').trim().toUpperCase(),
    });
  }
  return result;
}

// ── STATE PERSISTENCE ─────────────────────────────────────────────────────────
const LS_FILTERS = 'camperHQ_filters';
const LS_HOURS   = 'camperHQ_dayHours';

function saveState(){
  const f={};
  Object.keys(filters).forEach(k=>f[k]=[...filters[k]]);
  try{localStorage.setItem(LS_FILTERS,JSON.stringify(f));}catch(e){}
  try{localStorage.setItem(LS_HOURS,JSON.stringify(dayHours));}catch(e){}
}
function loadState(){
  try{
    const f=JSON.parse(localStorage.getItem(LS_FILTERS)||'{}');
    Object.keys(filters).forEach(k=>{if(f[k])filters[k]=new Set(f[k]);});
  }catch(e){}
  try{
    const h=JSON.parse(localStorage.getItem(LS_HOURS)||'{}');
    if(h&&typeof h==='object'){
      const todayStr=fmtISO(new Date());
      // Drop stale 0h entries for past dates — these were likely test artifacts
      // that would block the scheduler from ever using those days
      Object.keys(h).forEach(k=>{
        if(h[k]===0&&k<todayStr) delete h[k];
      });
      dayHours=h;
    }
  }catch(e){}
}

// ── DRAG-TO-REORDER ──────────────────────────────────────────────────────────
// Drag a task label row onto another task label within the SAME stage.
// Drop X onto Y → X gets Y's Item #; Y and everything after shifts up by 1.
// Optimistic local update shown immediately; user confirms before writing to Sheets.

let dragState = null;
let pendingReorder = null;
const ghost = document.getElementById('drag-ghost');

function initDrag() {
  // ── Drag state ─────────────────────────────────────────────────────────────
  var rafId      = null;
  var cursorY    = -1;
  var touchPend  = null;

  // ── Scroll ─────────────────────────────────────────────────────────────────
  // Triggered ONLY when cursor is within EDGE px of the ACTUAL list boundary.
  // We measure the boundary fresh each frame so it always reflects current layout.
  function getScrollEl() {
    if (isMobile()) return document.getElementById('mobile-list');
    return document.getElementById('ganttTimeline');
  }

  // Cache scroll boundaries on dragstart — measured once when layout is stable
  var _scrollTop = 0;   // viewport y of gantt top edge
  var _scrollBot = 0;   // viewport y of gantt bottom edge

  function cacheScrollBounds() {
    var el = getScrollEl();
    if (!el) return;
    // Walk up the DOM to find the first ancestor with a non-zero offsetTop
    // to get true viewport position regardless of flex/overflow context
    var node = el;
    var offsetTop = 0;
    while (node) {
      offsetTop += node.offsetTop || 0;
      node = node.offsetParent;
    }
    _scrollTop = offsetTop;
    _scrollBot = Math.min(offsetTop + el.clientHeight, window.innerHeight);

  }

  function tick() {
    if (!dragState) { rafId = null; return; }
    rafId = requestAnimationFrame(tick);
    if (cursorY < 0) return;

    var el = getScrollEl();
    if (!el) return;
    var top  = _scrollTop;
    var bot  = _scrollBot;
    var ZONE = 120;
    var MAX  = 18;

    var delta = 0;
    if (cursorY < top + ZONE) {
      var ratio = 1 - Math.max(0, cursorY - top) / ZONE;
      delta = -Math.max(1, Math.round(MAX * ratio));
    } else if (cursorY > bot - ZONE) {
      var ratio2 = 1 - Math.max(0, bot - cursorY) / ZONE;
      delta = Math.max(1, Math.round(MAX * ratio2));
    }

    if (delta !== 0) {
      el.scrollTop += delta;
      var ls = document.getElementById('labelsScroll');
      if (ls) ls.scrollTop = el.scrollTop;
    }
  }

  function startTick() { if (!rafId) rafId = requestAnimationFrame(tick); }
  function stopTick()  { if (rafId)  { cancelAnimationFrame(rafId); rafId = null; } }

  // ── Drop logic (shared) ────────────────────────────────────────────────────
  function execDrop(targetRow) {
    if (!dragState || !targetRow) return cleanupDrag();
    var tEtap = parseFloat(targetRow.dataset.etap);
    var tItem = parseFloat(targetRow.dataset.item);
    if (tEtap === dragState.etap && tItem === dragState.item) return cleanupDrag();

    var src = rawData.find(function(r) {
      return r.etap === dragState.etap && r.item === dragState.item && r.typ !== 'ETAP';
    });
    if (!src) return cleanupDrag();

    var updates = [];
    rawData = rawData.map(function(r) {
      if (r.typ === 'ETAP' || r.item == null) return r;
      if (r.opis === src.opis) {
        updates.push({ opis: r.opis, etap: r.etap, oldItem: r.item, newItem: tItem });
        return Object.assign({}, r, { item: tItem });
      }
      if (r.item >= tItem) {
        updates.push({ opis: r.opis, etap: r.etap, oldItem: r.item, newItem: r.item + 1 });
        return Object.assign({}, r, { item: r.item + 1 });
      }
      return r;
    });

    if (!updates.length) return cleanupDrag();
    pendingReorder = { updates: updates };
    showWritebar(dragState.opis||'', targetRow.dataset.opis||'', updates.length);
    cleanupDrag();
    render();
    initDrag();
  }

  // ── Desktop drag (HTML5) ───────────────────────────────────────────────────
  var container = document.getElementById('labelRows');
  if (!container) return;

  // onDocDragOver fires on the whole document by always calling preventDefault.
  // This is the ONLY reliable way to track cursor position during HTML5 drag —
  // mousemove is suppressed by browsers during drag, and dragover only fires
  // on elements that call preventDefault (which wouldn't cover headers/empty space).
  function onDocDragOver(e) {
    e.preventDefault(); // must call this to receive dragover everywhere
    if (!dragState) return;
    cursorY = e.clientY;
    ghost.style.left = (e.clientX + 14) + 'px';
    ghost.style.top  = (e.clientY - 10) + 'px';
  }

  container.addEventListener('dragstart', function(e) {
    var row = e.target.closest('[draggable=true][data-etap]');
    if (!row) return;
    dragState = { etap: parseFloat(row.dataset.etap), item: parseFloat(row.dataset.item), opis: row.dataset.opis, sourceEl: row };
    row.classList.add('drag-source');
    ghost.textContent = row.dataset.opis;
    ghost.style.display = 'block';
    ghost.style.left = '-9999px'; ghost.style.top = '-9999px';
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setDragImage(ghost, 10, 10); } catch(x) {}
    hideTT();
    cacheScrollBounds();  // measure gantt bounds before drag moves anything
    document.addEventListener('dragover', onDocDragOver);
    startTick();
  });

  container.addEventListener('dragover', function(e) {
    if (!dragState) return;
    var row = e.target.closest('[draggable=true][data-etap]');
    if (!row) return;
    if (parseFloat(row.dataset.etap) === dragState.etap && parseFloat(row.dataset.item) === dragState.item) return;
    // e.preventDefault() is handled by onDocDragOver on document — no need here
    document.querySelectorAll('.drop-target').forEach(function(x){ x.classList.remove('drop-target'); });
    row.classList.add('drop-target');
  });

  container.addEventListener('dragleave', function(e) {
    var row = e.target.closest('[draggable=true][data-etap]');
    if (row) row.classList.remove('drop-target');
  });

  container.addEventListener('drop', function(e) {
    e.preventDefault();
    execDrop(e.target.closest('[draggable=true][data-etap]'));
  });

  container.addEventListener('dragend', function() {
    stopTick();
    cursorY = -1;
    document.removeEventListener('dragover', onDocDragOver);
    cleanupDrag();
  });

  // ── Mobile touch drag ──────────────────────────────────────────────────────
  function attachTouchTo(el) {
    if (!el) return;
    // Always use window._ganttTouchFns so this works when called from outside initDrag
    var fns = window._ganttTouchFns || { onTS: onTS, onTM: onTM, onTE: onTE };
    el.removeEventListener('touchstart', fns.onTS);
    el.removeEventListener('touchmove',  fns.onTM);
    el.removeEventListener('touchend',   fns.onTE);
    el.addEventListener('touchstart', fns.onTS, { passive: true });
    el.addEventListener('touchmove',  fns.onTM, { passive: false });
    el.addEventListener('touchend',   fns.onTE, { passive: true });
  }

  // Touch drag: long-press 300ms to initiate, then drag freely
  // touchPend tracks the pending long-press; once dragState is set, drag is live

  function onTS(e) {
    var row = e.target.closest('[data-etap][data-item]');
    if (!row || dragState) return;
    var t = e.touches[0];
    touchPend = {
      row:    row,
      x0:     t.clientX,
      y0:     t.clientY,
      lastX:  t.clientX,
      lastY:  t.clientY,
      timer:  setTimeout(function() {
        if (!touchPend) return;
        dragState = {
          etap:     parseFloat(row.dataset.etap),
          item:     parseFloat(row.dataset.item),
          opis:     row.dataset.opis || '',
          sourceEl: row
        };
        row.classList.add('drag-source');
        ghost.textContent = dragState.opis || (row.querySelector('.mb-task-name,label') || {}).textContent || '';
        ghost.style.cssText = ghost.style.cssText; // force repaint
        ghost.style.display = 'block';
        ghost.style.left = (touchPend.lastX + 14) + 'px';
        ghost.style.top  = (touchPend.lastY - 10) + 'px';
        cacheScrollBounds();
        if (navigator.vibrate) navigator.vibrate(40);
        cursorY = touchPend.lastY;
        startTick();
      }, 300)
    };
  }

  function onTM(e) {
    if (!touchPend) return;
    var t = e.touches[0];
    touchPend.lastX = t.clientX;
    touchPend.lastY = t.clientY;
    if (!dragState) {
      // Cancel long-press if finger moved more than 10px before timer fires
      if (Math.abs(t.clientX - touchPend.x0) > 10 || Math.abs(t.clientY - touchPend.y0) > 10) {
        clearTimeout(touchPend.timer);
        touchPend = null;
      }
      return;
    }
    e.preventDefault();
    cursorY = t.clientY;
    ghost.style.left = (t.clientX + 14) + 'px';
    ghost.style.top  = (t.clientY - 10) + 'px';
    // Find target under finger
    ghost.style.visibility = 'hidden';
    var under = document.elementFromPoint(t.clientX, t.clientY);
    ghost.style.visibility = 'visible';
    document.querySelectorAll('.drop-target').forEach(function(x){ x.classList.remove('drop-target'); });
    var trow = under && under.closest('[data-etap][data-item]');
    if (trow && trow !== touchPend.row) trow.classList.add('drop-target');
  }

  function onTE(e) {
    if (!touchPend) return;
    var pend = touchPend;
    touchPend = null;
    clearTimeout(pend.timer);
    if (!dragState) return; // long-press didn't fire yet — just a tap, ignore
    var t = e.changedTouches[0];
    stopTick();
    cursorY = -1;
    ghost.style.visibility = 'hidden';
    var under = document.elementFromPoint(t.clientX, t.clientY);
    ghost.style.display = 'none';
    ghost.style.visibility = 'visible';
    document.querySelectorAll('.drop-target').forEach(function(x){ x.classList.remove('drop-target'); });
    var trow = under && under.closest('[data-etap][data-item]');
    if (trow && trow !== pend.row) {
      execDrop(trow);
    } else {
      cleanupDrag();
    }
  }

  // Store fns FIRST so attachTouchTo can reference them
  window._ganttTouchFns      = { onTS: onTS, onTM: onTM, onTE: onTE };
  window._ganttAttachTouchTo = attachTouchTo;
  attachTouchTo(container);
  attachTouchTo(document.getElementById('mobile-list'));
}

function cleanupDrag() {
  if (dragState && dragState.sourceEl) dragState.sourceEl.classList.remove('drag-source');
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  ghost.style.display = 'none';
  dragState = null;
}

function showWritebar(fromName, toName, count) {
  document.getElementById('wbMsg').textContent =
    `"${(fromName||'').slice(0,28)}" → before "${(toName||'').slice(0,28)}" · ${count} rows renumbered`;
  document.getElementById('writebar').classList.add('show');
}

document.getElementById('wbConfirm').addEventListener('click', () => {
  if (!pendingReorder) return;
  document.getElementById('writebar').classList.remove('show');
  if (!SHEETS_CSV_URL || SHEETS_CSV_URL.includes('YOUR_')) {
    showToast('Configure SHEETS_CSV_URL to enable write-back.', 'warn'); return;
  }
  showToast('Writing to Sheets…', 'info');
  const payload = JSON.stringify({ action: 'reorder', updates: pendingReorder.updates });
  const xhr = new XMLHttpRequest();
  xhr.open('POST', SHEETS_CSV_URL, true);
  xhr.setRequestHeader('Content-Type', 'text/plain');
  xhr.timeout = 12000;
  xhr.onload = function(){
    const text = xhr.responseText;
    if(text.toLowerCase().includes('error')){
      showToast('Write failed: '+text.slice(0,100),'error');
      showWriteScriptHelp();
    } else {
      showToast('Sheets updated ✓ — reloading…','ok');
      pendingReorder = null;
      setTimeout(loadFromSheets, 900);
    }
  };
  xhr.onerror = function(){ showToast('Network error on write','error'); };
  xhr.ontimeout = function(){ showToast('Write timed out','error'); };
  xhr.send(payload);
});

document.getElementById('wbCancel').addEventListener('click', () => {
  document.getElementById('writebar').classList.remove('show');
  pendingReorder = null;
  loadFromSheets(); // revert optimistic change by reloading
});

function showWriteScriptHelp() {
  const existing = document.getElementById('write-help');
  if (existing) { existing.remove(); return; }
  const div = document.createElement('div'); div.id = 'write-help';
  div.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--surface);border:0.5px solid var(--border-strong);border-radius:var(--radius);padding:14px 18px;max-width:500px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.2);line-height:1.6';
  div.innerHTML = `<div style="font-weight:600;margin-bottom:8px">Add write support to Apps Script</div>
    <div style="color:var(--text-sec);margin-bottom:8px">Add this <b>doPost</b> function alongside your existing <b>doGet</b>, then <b>redeploy as a new version</b>:</div>
    <pre style="background:var(--bg);padding:9px;border-radius:4px;font-size:10px;overflow:auto;line-height:1.6;margin-bottom:10px">function doPost(e){
  try{
    var payload=JSON.parse(e.postData.contents);
    if(payload.action!=='reorder') throw new Error('unknown action');
    var ws=SpreadsheetApp.getActiveSpreadsheet()
          .getSheetByName('📋 Plan główny');
    var data=ws.getDataRange().getValues();
    var headers=data[1];
    var colEtap=headers.indexOf('Etap #');
    var colItem=headers.indexOf('Item #');
    // Match every update by Opis (col index 3) — globally unique task name.
    // Process HIGHER oldItem first so shifts don't create temporary collisions.
    var colOpis=3;
    payload.updates.sort(function(a,b){ return b.oldItem - a.oldItem; });
    payload.updates.forEach(function(u){
      for(var i=2;i&lt;data.length;i++){
        if(String(data[i][colOpis])===String(u.opis)){
          ws.getRange(i+1,colItem+1).setValue(u.newItem);
          data[i][colItem]=u.newItem;
          break;
        }
      }
    });
    return ContentService
      .createTextOutput(JSON.stringify({ok:true}))
      .setMimeType(ContentService.MimeType.JSON);
  }catch(err){
    return ContentService
      .createTextOutput('Error: '+err.message)
      .setMimeType(ContentService.MimeType.TEXT);
  }
}</pre>

  document.body.appendChild(div);
}


// ── RESIZABLE SPLITTER ────────────────────────────────────────────────────────
function initSplitter(){
  const splitter = document.getElementById('gantt-splitter');
  const labels   = document.querySelector('.gantt-labels');
  if(!splitter||!labels) return;
  let startX=0, startW=0;
  splitter.addEventListener('mousedown', e=>{
    startX = e.clientX;
    startW = labels.offsetWidth;
    splitter.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    const onMove = e=>{
      const delta = e.clientX - startX;
      const newW  = Math.max(160, Math.min(600, startW + delta));
      labels.style.width = newW+'px';
    };
    const onUp = ()=>{
      splitter.classList.remove('dragging');
      document.body.style.cursor='';
      document.body.style.userSelect='';
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
  // Touch support
  splitter.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startW = labels.offsetWidth;
    splitter.classList.add('dragging');
    const onMove = e=>{
      const delta = e.touches[0].clientX - startX;
      const newW  = Math.max(160, Math.min(600, startW + delta));
      labels.style.width = newW+'px';
    };
    const onEnd = ()=>{
      splitter.classList.remove('dragging');
      splitter.removeEventListener('touchmove',onMove);
      splitter.removeEventListener('touchend',onEnd);
    };
    splitter.addEventListener('touchmove',onMove,{passive:true});
    splitter.addEventListener('touchend',onEnd);
  },{passive:true});
}

// ── MOBILE ────────────────────────────────────────────────────────────────────
function isMobile(){
  // Use the smaller of width/height so landscape phones still get mobile view
  return Math.min(window.screen.width, window.screen.height) <= 430
      || window.innerWidth <= 680;
}

// Mobile filter state — independent of desktop filters
const mbFilter = { etap: '', status: '', tydzen: '' };

// ── Drawer ────────────────────────────────────────────────────────────────────
function initMobileDrawer(){
  const hamburger = document.getElementById('mb-hamburger');
  const drawer    = document.getElementById('mb-drawer');
  if(!hamburger||!drawer) return;

  hamburger.addEventListener('click', e=>{ e.stopPropagation(); drawer.classList.toggle('open'); });
  document.getElementById('mb-close-drawer').addEventListener('click', ()=>drawer.classList.remove('open'));
  document.addEventListener('click', e=>{ if(!drawer.contains(e.target)&&e.target!==hamburger) drawer.classList.remove('open'); });

  // Populate stage buttons
  const stageBtns = document.getElementById('mb-stage-btns');
  const allStageBtn = makeDrawerBtn('All stages', ()=>{ mbFilter.etap=''; updateDrawerBtns(stageBtns,''); renderMobile(); });
  allStageBtn.classList.add('active-btn');
  stageBtns.appendChild(allStageBtn);
  getStages().forEach(s=>{
    const b = makeDrawerBtn('E'+s.etap, ()=>{ mbFilter.etap=String(s.etap); updateDrawerBtns(stageBtns,String(s.etap)); renderMobile(); });
    b.title = s.opis;
    b.style.background = STAGE_COLORS[s.etap]||'#888';
    b.style.color = '#fff'; b.style.borderColor = 'transparent';
    stageBtns.appendChild(b);
  });

  // Status buttons already in drawer HTML — wire them
  const statusBtns = document.getElementById('mb-status-btns');
  [['All',''],['To do','Do zrobienia'],['In progress','W toku'],['Blocked','Zablokowane'],['Done','Zrobione'],['Drafting','W formułowaniu']].forEach(([label,val])=>{
    const b = makeDrawerBtn(label, ()=>{ mbFilter.status=val; updateDrawerBtns(statusBtns,val); renderMobile(); });
    if(!val) b.classList.add('active-btn');
    statusBtns.appendChild(b);
  });

  // Action buttons
  document.getElementById('mb-reload-btn').addEventListener('click',()=>{ drawer.classList.remove('open'); loadFromSheets(); });
  document.getElementById('mb-clear-storage-btn').addEventListener('click',()=>{
    try{localStorage.removeItem(LS_FILTERS);localStorage.removeItem(LS_HOURS);}catch(e){}
    dayHours={}; Object.keys(filters).forEach(k=>filters[k].clear());
    rebuildFilterOptions(); render(); renderMobile();
    showToast('Storage cleared','ok'); drawer.classList.remove('open');
  });
  document.getElementById('mb-setup-btn').addEventListener('click',()=>{ drawer.classList.remove('open'); showCorsHelp(); });
}
function makeDrawerBtn(label, onClick){
  const b = document.createElement('button');
  b.className='mb-drawer-btn'; b.textContent=label;
  b.addEventListener('click', onClick); return b;
}
function updateDrawerBtns(container, activeVal){
  container.querySelectorAll('.mb-drawer-btn').forEach(b=>{
    const isAll = activeVal==='' && (b.textContent==='All stages'||b.textContent==='All');
    const isMatch = b.textContent!=='All stages'&&b.textContent!=='All'&&b._val===activeVal;
    b.classList.toggle('active-btn', isAll||isMatch);
  });
  // Store val on button for lookup
  container.querySelectorAll('.mb-drawer-btn').forEach(b=>{ if(!b._val) b._val=b.dataset&&b.dataset.val||''; });
}

// ── Chip filter bar ───────────────────────────────────────────────────────────
function initChips(){
  document.querySelectorAll('#mb-chips .mb-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const f=chip.dataset.filter, v=chip.dataset.val;
      mbFilter[f]=mbFilter[f]===v?'':v;  // toggle
      // Update chip active states within this filter group
      document.querySelectorAll(`#mb-chips .mb-chip[data-filter="${f}"]`).forEach(c=>{
        c.classList.toggle('on', c.dataset.val===mbFilter[f]||(mbFilter[f]===''&&c.dataset.val===''));
      });
      renderMobile();

  });
}

// ── Render ────────────────────────────────────────────────────────────────────
const DOW_FULL_PL = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];

function renderMobile(){
  if(!isMobile()) return;
  const schedTasks=[];
  rawData.forEach(r=>{
    if(r.typ==='ETAP'||!r.czas||r.czas<=0||r.item==null) return;
    if(mbFilter.etap   && String(r.etap)!==mbFilter.etap) return;
    if(mbFilter.status && r.status!==mbFilter.status) return;
    if(mbFilter.tydzen && r.tenTydzen!==mbFilter.tydzen) return;
    schedTasks.push(r);
  });
  schedTasks.sort((a,b)=>Number(a.item)-Number(b.item));
  const scheduled=schedule(schedTasks);

  const totalH=scheduled.reduce((s,t)=>s+(t.czas||0),0);
  const lastDate=scheduled.filter(t=>!t.pinned).reduce((d,t)=>(!d||t.endDate>d?t.endDate:d),null);
  document.getElementById('mobile-infobar').innerHTML=
    `<span>${scheduled.length} tasks · ${totalH.toFixed(1)}h</span>`+
    (lastDate?`<span>Done by: <strong>${fmtLong(lastDate)}</strong></span>`:'');

  const today=new Date(); today.setHours(0,0,0,0);
  const stageNameMap={};
  getStages().forEach(s=>{ stageNameMap[s.etap]=s.opis; });

  // ── Build day→stage→tasks map ─────────────────────────────────────────────
  // Each scheduled task has segs[]; use startDate as the primary day key.
  // Tasks spanning multiple days appear under each day they touch.
  const dayMap={}; // dateISO → { etap → [task] }
  scheduled.forEach(task=>{
    if(!task.segs) return;
    const seenDays=new Set();
    task.segs.forEach(seg=>{
      const dk=fmtISO(seg.date);
      if(seenDays.has(dk)) return;
      seenDays.add(dk);
      if(!dayMap[dk]) dayMap[dk]={};
      if(!dayMap[dk][task.etap]) dayMap[dk][task.etap]=[];
      dayMap[dk][task.etap].push({...task, _segHours: seg.hours});
    });
  });

  // Sort days ascending (today first naturally)
  const sortedDays=Object.keys(dayMap).sort();

  const statusCls={'Zrobione':'ms-done','W toku':'ms-wip','Zablokowane':'ms-blocked','Do zrobienia':'ms-todo','W formułowaniu':'ms-form'};

  let html='';
  if(!sortedDays.length){
    html='<div style="padding:32px 16px;text-align:center;color:var(--text-sec)">No tasks match.</div>';
  }
  sortedDays.forEach(dk=>{
    const [dy,dm,dd]=dk.split('-').map(Number); const d=new Date(dy,dm-1,dd);
    const isToday=dk===fmtISO(today);
    const dayLabel=isToday?'Dziś — '+DOW_FULL_PL[d.getDay()]:DOW_FULL_PL[d.getDay()];
    const cap=getDayAvail(dk);
    const dayH=Object.values(dayMap[dk]).flat().reduce((s,t)=>s+(t._segHours||0),0);

    html+=`<div class="mb-day${isToday?' is-today':''}">
      <span class="mb-day-name">${dayLabel}</span>
      <span class="mb-day-date">${fmtDD(d)}</span>
      <span class="mb-day-h">${dayH.toFixed(1)}h / ${cap}h</span>
    </div>`;

    // Stages within this day, in stage order
    const etapsToday=Object.keys(dayMap[dk]).map(Number).sort((a,b)=>a-b);
    etapsToday.forEach(etap=>{
      const sc=STAGE_COLORS[etap]||'#888';
      const stageName=(stageNameMap[etap]||'').slice(0,32);

      // Stage sub-header
      if(!mbFilter.etap){ // only show stage header when not already filtered to one stage
        html+=`<div class="mb-day-stage">
          <span class="mb-day-stage-num" style="background:${sc}">E${etap}</span>
          <span class="mb-day-stage-name">${stageName}</span>
        </div>`;
      }

      // Tasks for this day+stage, sorted by Item #
      const tasks=dayMap[dk][etap].slice().sort((a,b)=>Number(a.item)-Number(b.item));
      tasks.forEach(task=>{
        const isUrgent=task.priorytet==='Pilne';
        const scls=statusCls[task.status]||'ms-todo';
        const barColor=task.status==='Zablokowane'?'#b01a1a':sc;
        // For multi-day tasks show today's hours vs total
        const hoursLabel=task.segs.length>1
          ?`${task._segHours.toFixed(1)}h / ${task.czas}h`
          :`${task.czas}h`;

        html+=`<div class="mb-task" draggable="true" data-etap="${task.etap}" data-item="${task.item}" data-opis="${(task.opis||'').replace(/`/g,'\\`').replace(/"/g,'&quot;')}">
          <div class="mb-task-bar" style="background:${barColor}"></div>
          <div class="mb-task-body">
            <div class="mb-task-name${isUrgent?' urgent':''}">
              ${task.tenTydzen==='TAK'?'<span class="mb-tw"></span> ':''}${task.opis}
            </div>
            <div class="mb-task-meta">
              <span class="badge b-${task.typ}">${task.typ}</span>
              <span class="mb-status ${scls}">${task.status}</span>
            </div>
          </div>
          <div class="mb-task-right">
            <span class="mb-hours">${hoursLabel}</span>
            <span class="mb-item-num">#${task.item}</span>
          </div>
        </div>`;
      });
    });
  });

  document.getElementById('mobile-list').innerHTML=html;
  // Re-attach touch drag listeners to the rebuilt list
  if (window._ganttAttachTouchTo && window._ganttTouchFns) {
    window._ganttAttachTouchTo(document.getElementById('mobile-list'));
  }
  // Re-attach touch drag listeners after list is rebuilt
  var mbl2 = document.getElementById('mobile-list');
  if (mbl2 && window._mobileInitDragDone) {
    mbl2.removeEventListener('touchstart', window._onMobileTouchStart);
    mbl2.removeEventListener('touchmove',  window._onMobileTouchMove);
    mbl2.removeEventListener('touchend',   window._onMobileTouchEnd);
    mbl2.addEventListener('touchstart', window._onMobileTouchStart, {passive:true});
    mbl2.addEventListener('touchmove',  window._onMobileTouchMove,  {passive:false});
    mbl2.addEventListener('touchend',   window._onMobileTouchEnd,   {passive:true});
  }
}

window.addEventListener('resize',()=>{ if(isMobile()) renderMobile(); });
window.addEventListener('orientationchange',()=>{
  setTimeout(()=>{ if(isMobile()) renderMobile(); else render(); }, 150);
});

// ── CAPACITY WRITE-BACK ───────────────────────────────────────────────────────
// Posts a single date's capacity override to Sheets.
// hours=null means "reset to default" — Apps Script deletes the row.
function postCapacity(date, hours){
  if(!SHEETS_CSV_URL||SHEETS_CSV_URL.includes('YOUR_')) return; // not configured
  const payload = JSON.stringify({action:'setCapacity', date, hours});
  const xhr = new XMLHttpRequest();
  xhr.open('POST', SHEETS_CSV_URL, true);
  xhr.setRequestHeader('Content-Type','text/plain');
  xhr.timeout = 10000;
  xhr.onload = function(){
    if(xhr.responseText.toLowerCase().includes('error')){
      console.warn('Capacity write failed:', xhr.responseText);
    }
  };
  xhr.onerror = ()=>console.warn('Capacity write network error');
  xhr.send(payload);
}

document.getElementById('prevWeek').addEventListener('click',()=>{viewWeekOffset--;render();});
document.getElementById('nextWeek').addEventListener('click',()=>{viewWeekOffset++;render();});
document.getElementById('todayBtn').addEventListener('click',()=>{viewWeekOffset=0;render();});
document.getElementById('resetHours').addEventListener('click',()=>{
  // Post null (reset) for every currently overridden date before clearing
  Object.keys(dayHours).forEach(date=>postCapacity(date, null));
  dayHours={};
  document.querySelectorAll('#dayInputs input[type=number]').forEach(inp=>{
    inp.value=DEFAULT_HOURS;
  });
  saveState();render();
});
document.getElementById('setupBtn').addEventListener('click', showCorsHelp);
document.getElementById('reloadBtn').addEventListener('click',loadFromSheets);
document.getElementById('clearStorageBtn').addEventListener('click',()=>{
  try{localStorage.removeItem(LS_FILTERS);localStorage.removeItem(LS_HOURS);}catch(e){}
  dayHours={};
  Object.keys(filters).forEach(k=>filters[k].clear());
  rebuildFilterOptions();
  render();
  showToast('Storage cleared — hours reset to 4h defaults','ok');
  if(SHEETS_CSV_URL&&!SHEETS_CSV_URL.includes('YOUR_')) loadFromSheets();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
rebuildFilterOptions();
render();
if(isMobile()){
  initMobileDrawer();
  initChips();
  renderMobile();
} else {
  initSplitter();
}
initDrag();
syncScroll();
if(SHEETS_CSV_URL && !SHEETS_CSV_URL.includes('YOUR_')){
  loadFromSheets();
}
</script>
